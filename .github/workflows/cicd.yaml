
name: ArgoCD project using GitHub Actions
on:
  push:
    branches:
      - main

jobs:
  build_code:
    runs-on: ubuntu-latest
    env:
      REGISTRY: docker.io
      IMAGE_NAME: gollarakesh/webapps

    steps:
      - name: code Checkout
        uses: actions/checkout@v4

      - name: Build code
        run: mvn clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker Image 
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.run_number }}

      - name: Update Deployment manifest file
        run: |
              echo "updating Deployment manifest"
              sed -i "s|${IMAGE_NAME}:.*|${IMAGE_NAME}:${{ github.run_number }}|g" deploymentfiles/deployment.yaml
              echo "updated deployment:"
              cat deploymentfiles/deployment.yaml

      - name: Commit and push manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update deployment image to version ${{ github.run_number }}"
          branch: main 



    
        
